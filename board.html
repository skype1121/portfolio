<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A Board | System-1 Applicant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        /* Board Clean & Wide Layout */
        .board-container {
            max-width: 1600px;
            width: 95%;
            margin: 120px auto 50px auto;
            padding: 0 2rem;
            position: relative;
        }

        .board-layout {
            display: flex;
            gap: 5rem;
            align-items: flex-start;
        }

        .board-left {
            flex: 3;
            min-width: 0;
        }

        .board-right {
            flex: 1;
            min-width: 320px;
            position: sticky;
            top: 120px;
        }

        @media (max-width: 1000px) {
            .board-layout {
                flex-direction: column;
                gap: 2rem;
            }

            .board-right {
                position: relative;
                top: 0;
                width: 100%;
                margin-bottom: 2rem;
            }
        }

        /* Clean Post Design */
        .post-card {
            margin-bottom: 2.5rem;
            padding: 2.5rem;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.1) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-left: 3px solid rgba(0, 229, 255, 0.4);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.2) 100%);
            border-left-color: var(--bd-cyan);
            box-shadow: 0 10px 30px -10px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }

        .post-author {
            font-weight: 800;
            font-size: 1.15rem;
            color: #fff;
            display: flex;
            align-items: center;
        }

        .author-badge {
            background: rgba(0, 229, 255, 0.1);
            color: var(--bd-cyan);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 0.6rem;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        .post-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            font-family: var(--font-mono);
            letter-spacing: 1px;
            text-align: right;
        }

        .post-content {
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            font-size: 1rem;
            font-weight: 300;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Reply Block */
        .reply-block {
            margin-top: 2rem;
            padding: 1.5rem 1.5rem 1.5rem 2rem;
            background: rgba(0, 255, 100, 0.02);
            border-left: 2px solid rgba(0, 255, 100, 0.3);
            border-radius: 0 8px 8px 0;
        }

        .reply-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .reply-author {
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .reply-badge {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 0.6rem;
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }

        /* Text Actions (No heavy boxes) */
        .post-actions {
            display: flex;
            gap: 1.2rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .action-text-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
            font-family: var(--font-mono);
            padding: 0;
        }

        .action-text-btn:hover {
            color: #fff;
        }

        .action-text-btn.edit:hover {
            color: var(--bd-cyan);
        }

        .action-text-btn.delete:hover {
            color: #ff3333;
        }

        .action-text-btn.reply:hover {
            color: #00ff64;
        }

        /* Clean Form Design */
        .board-form {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.1) 100%);
            backdrop-filter: blur(10px);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 20px rgba(0,229,255,0.03);
        }

        .board-input,
        .board-textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 1rem 0;
            font-family: var(--font-heading);
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem;
        }

        .board-input:focus,
        .board-textarea:focus {
            outline: none;
            border-color: var(--bd-cyan);
            background: rgba(0, 229, 255, 0.02);
            padding-left: 0.5rem;
        }

        .board-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .board-submit {
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--bd-cyan);
            color: var(--bd-cyan);
            padding: 1rem;
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            letter-spacing: 2px;
            margin-top: 1rem;
        }

        .board-submit:hover {
            background: var(--bd-cyan);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        }

        /* Reply Form UI */
        .reply-form-container {
            margin-top: 1.5rem;
            padding: 1.5rem 1.5rem 1.5rem 2rem;
            background: rgba(0, 255, 100, 0.03);
            border-left: 2px solid #00ff64;
            border-radius: 0 8px 8px 0;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div class="overlay-grid"></div>

    <nav>
        <!-- Logo Area -->
        <div class="nav-logo" style="display: flex; align-items: center; gap: 12px; cursor: pointer;" onclick="window.location.href='index.html'">
            <svg width="34" height="34" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5 L90 27 L90 73 L50 95 L10 73 L10 27 Z" stroke="#8b5cf6" stroke-width="6" stroke-linejoin="round" fill="rgba(139, 92, 246, 0.1)"/>
                <path d="M50 5 L50 50 L90 73" stroke="#8b5cf6" stroke-width="5" stroke-linejoin="round"/>
                <path d="M50 50 L10 73" stroke="#8b5cf6" stroke-width="5" stroke-linejoin="round"/>
                <path d="M10 27 L50 50 L90 27" stroke="#8b5cf6" stroke-width="5" stroke-linejoin="round" stroke-dasharray="4 4"/>
                <circle cx="50" cy="50" r="4" fill="#00e5ff"/>
            </svg>
            <span style="color: #fff; font-family: var(--font-heading); font-weight: 800; font-size: 1.3rem; letter-spacing: 1px;">RSY</span>
        </div>

        <div style="display: flex; align-items: stretch; gap: 0.5rem; height: 100%;">
            <a href="index.html" class="nav-archive-btn lang-text" data-ko="소개" data-en="INTRO">소개</a>
            <a href="project1.html" class="nav-archive-btn lang-text" data-ko="2026 프로젝트" data-en="2026 Projects">2026
                프로젝트</a>
            <a href="project2.html" class="nav-archive-btn lang-text" data-ko="2025 프로젝트" data-en="2025 Projects">2025
                프로젝트</a>
            <a href="board.html" class="nav-archive-btn lang-text" data-ko="Q&A 게시판" data-en="Q&A Board">Q&A 게시판</a>
            <a href="contact.html" class="nav-archive-btn lang-text" data-ko="CONTACT" data-en="CONTACT">CONTACT</a>
            <div class="lang-pill" style="margin-left: 0.5rem;">
                <div class="pill-bg"></div>
                <button class="pill-btn active" onclick="setLang('ko')">KO</button>
                <button class="pill-btn" onclick="setLang('en')">EN</button>
            </div>
        </div>
    </nav>

    <main class="board-container">

        <div class="board-layout">
            <!-- Left Side: Posts List -->
            <div class="board-left">
                <h1 class="contact-title lang-text"
                    style="font-size: 2.5rem; margin-bottom: 3rem; color: #fff; text-align: left; text-shadow: 0 0 15px rgba(0,229,255,0.2);"
                    data-ko="Q&A 자유게시판" data-en="Q&A Free Board">Q&A 자유게시판</h1>

                <div id="postsList">
                    <!-- Posts rendered here -->
                </div>
            </div>

            <!-- Right Side: Write Form -->
            <div class="board-right board-form" id="postFormContainer">
                <h3 class="lang-text"
                    style="color:var(--bd-cyan); margin-bottom:0.5rem; font-family:var(--font-mono); font-size:1.1rem; letter-spacing: 1px;"
                    data-ko="새로운 글 작성" data-en="WRITE NEW POST">새로운 글 작성</h3>
                <p class="lang-text" style="color:rgba(255,255,255,0.4); font-size:0.85rem; margin-bottom:2rem;"
                    data-ko="자유롭게 질문이나 피드백을 남겨주세요." data-en="Feel free to leave any questions or feedback.">자유롭게 질문이나
                    피드백을 남겨주세요.</p>

                <input type="hidden" id="editPostId" value="">

                <input type="text" id="postAuthor" class="board-input lang-text" placeholder="이름 (Author)"
                    data-ko="이름 (Author)" data-en="Name (Author)" required>

                <textarea id="postContent" class="board-textarea lang-text" placeholder="내용을 입력하세요" data-ko="내용을 입력하세요"
                    data-en="Enter your message here..." required></textarea>

                <button type="button" class="board-submit lang-text" onclick="savePost()" data-ko="게시하기"
                    data-en="Post">게시하기</button>
                    
                <!-- Fast Contact UI -->
                <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px dashed rgba(255,255,255,0.1); text-align: center;">
                    <div style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.8rem; letter-spacing: 1px;">DIRECT CONTACT //</div>
                    <a href="contact.html" style="display: inline-flex; align-items: center; gap: 8px; background: rgba(0,229,255,0.05); color: var(--bd-cyan); border: 1px solid var(--bd-cyan); padding: 0.6rem 1.2rem; border-radius: 4px; text-decoration: none; font-family: var(--font-mono); font-size: 0.85rem; transition: all 0.3s ease; box-shadow: 0 0 10px rgba(0,229,255,0.1);" onmouseover="this.style.background='var(--bd-cyan)'; this.style.color='#000'; this.style.boxShadow='0 0 20px var(--bd-cyan)';" onmouseout="this.style.background='rgba(0,229,255,0.05)'; this.style.color='var(--bd-cyan)'; this.style.boxShadow='0 0 10px rgba(0,229,255,0.1)';">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <span>SEND EMAIL DIRECTLY</span>
                    </a>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
    <script>
        // Board logic with localStorage
        const STORAGE_KEY = 'sys1_qa_logs';

        function getPosts() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        }

        function savePosts(posts) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
        }

        function renderPosts() {
            const posts = getPosts();
            const list = document.getElementById('postsList');
            list.innerHTML = '';

            const isEn = document.querySelector('.lang-btn.active') ? document.querySelector('.lang-btn.active').innerText === 'EN' : false;

            if (posts.length === 0) {
                list.innerHTML = `<div style="text-align: center; color: rgba(255,255,255,0.3); font-family: var(--font-mono); padding: 5rem 0; font-size: 1.1rem;">${isEn ? 'No posts yet. Start the conversation!' : '게시물이 텅 비어있습니다. 첫 글을 남겨주세요!'}</div>`;
                return;
            }

            // 가장 최신의 질문이 위로 올라오게 해줘 (내림차순)
            posts.sort((a, b) => b.timestamp - a.timestamp);

            posts.forEach(post => {
                const date = new Date(post.timestamp);
                const isEdited = post.edited ? (isEn ? ' (Edited)' : ' (수정됨)') : '';
                const formatOpts = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
                const formattedDate = date.toLocaleString(isEn ? 'en-US' : 'ko-KR', formatOpts) + isEdited;

                let repliesHtml = '';
                if (post.replies && post.replies.length > 0) {
                    post.replies.forEach(reply => {
                        const rDate = new Date(reply.timestamp).toLocaleString(isEn ? 'en-US' : 'ko-KR', formatOpts);
                        repliesHtml += `
                            <div class="reply-block">
                                <div class="reply-header">
                                    <div class="reply-author">${escapeHtml(reply.author)} <span class="reply-badge">REPLY</span></div>
                                    <div class="post-meta">${rDate}</div>
                                </div>
                                <div class="post-content">${escapeHtml(reply.content)}</div>
                            </div>
                        `;
                    });
                }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.id = 'post-' + post.id;
                card.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">${escapeHtml(post.author)} <span class="author-badge">USER</span></div>
                        <div class="post-meta">${formattedDate}</div>
                    </div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    
                    ${repliesHtml}

                    <div class="post-actions">
                        <button class="action-text-btn reply" onclick="openReplyForm('${post.id}')">${isEn ? 'Reply' : '답변하기'}</button>
                        <button class="action-text-btn edit" onclick="editPost('${post.id}')">${isEn ? 'Edit' : '수정'}</button>
                        <button class="action-text-btn delete" onclick="deletePost('${post.id}')">${isEn ? 'Delete' : '삭제'}</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function openReplyForm(postId) {
            const existing = document.getElementById('active-reply-form');
            if (existing) existing.remove();

            const isEn = document.querySelector('.lang-btn.active') ? document.querySelector('.lang-btn.active').innerText === 'EN' : false;
            const postEl = document.getElementById('post-' + postId);

            const formHtml = `
                <div id="active-reply-form" class="reply-form-container">
                    <div style="font-family: var(--font-mono); font-size: 0.85rem; color: #00ff64; margin-bottom: 1.5rem; letter-spacing:1px;">${isEn ? 'WRITE REPLY' : '새로운 답변 작성'}</div>
                    <input type="text" id="replyAuthor" class="board-input" placeholder="${isEn ? 'Name' : '이름'}" style="padding: 0.5rem 0;" required>
                    <textarea id="replyContent" class="board-textarea" placeholder="${isEn ? 'Reply content...' : '답변을 적어주세요...'}" style="min-height: 60px; padding: 0.5rem 0;" required></textarea>
                    <div style="text-align: right; display: flex; gap: 1.5rem; justify-content: flex-end; margin-top: 0.5rem;">
                        <button class="action-text-btn" onclick="document.getElementById('active-reply-form').remove()">${isEn ? 'Cancel' : '취소'}</button>
                        <button class="action-text-btn reply" style="font-weight:bold;" onclick="submitReply('${postId}')">${isEn ? 'Post Reply' : '답변 등록'}</button>
                    </div>
                </div>
            `;
            postEl.insertAdjacentHTML('beforeend', formHtml);
        }

        function submitReply(postId) {
            const author = document.getElementById('replyAuthor').value.trim();
            const content = document.getElementById('replyContent').value.trim();
            const isEn = document.querySelector('.lang-btn.active') ? document.querySelector('.lang-btn.active').innerText === 'EN' : false;

            if (!author || !content) {
                alert(isEn ? 'Please fill out all fields.' : '답변 정보를 모두 입력해주세요.');
                return;
            }

            let posts = getPosts();
            const targetIndex = posts.findIndex(p => p.id === postId);
            if (targetIndex > -1) {
                if (!posts[targetIndex].replies) posts[targetIndex].replies = [];
                posts[targetIndex].replies.push({ author: author, content: content, timestamp: Date.now() });
                savePosts(posts);
                renderPosts();
            }
        }

        function savePost() {
            const authorEl = document.getElementById('postAuthor');
            const contentEl = document.getElementById('postContent');
            const idEl = document.getElementById('editPostId');
            const isEn = document.querySelector('.lang-btn.active') ? document.querySelector('.lang-btn.active').innerText === 'EN' : false;

            const author = authorEl.value.trim();
            const content = contentEl.value.trim();
            const id = idEl.value;

            if (!author || !content) {
                alert(isEn ? 'Both name and content are required.' : '이름과 내용을 모두 입력해주세요.');
                return;
            }

            let posts = getPosts();

            if (id) {
                // Edit
                const postIndex = posts.findIndex(p => p.id === id);
                if (postIndex > -1) {
                    posts[postIndex].author = author;
                    posts[postIndex].content = content;
                    posts[postIndex].edited = true;
                }
                idEl.value = '';
            } else {
                // New
                posts.push({
                    id: 'LOG_' + Date.now().toString(36) + Math.random().toString(36).substr(2),
                    author: author,
                    content: content,
                    timestamp: Date.now(),
                    replies: []
                });
            }

            savePosts(posts);
            authorEl.value = '';
            contentEl.value = '';
            renderPosts();
        }

        function editPost(id) {
            const posts = getPosts();
            const post = posts.find(p => p.id === id);
            if (post) {
                document.getElementById('postAuthor').value = post.author;
                document.getElementById('postContent').value = post.content;
                document.getElementById('editPostId').value = post.id;
                document.getElementById('postAuthor').focus();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function deletePost(id) {
            const isEn = document.querySelector('.lang-btn.active') ? document.querySelector('.lang-btn.active').innerText === 'EN' : false;
            const msg = isEn ? 'Are you sure you want to delete this post permanently?' : '해당 글과 모든 답변을 삭제하시겠습니까? (되돌릴 수 없습니다)';
            if (confirm(msg)) {
                let posts = getPosts();
                posts = posts.filter(p => p.id !== id);
                savePosts(posts);
                renderPosts();
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;")
                .replace(/\n/g, "<br>");
        }

        // Initialize board
        document.addEventListener('DOMContentLoaded', renderPosts);

        // Re-render when lang changes to update the empty text / buttons translation
        const originalSetLang = window.setLang;
        window.setLang = function (lang) {
            if (originalSetLang) originalSetLang(lang);
            setTimeout(renderPosts, 400);

            setTimeout(() => {
                const authorInput = document.getElementById('postAuthor');
                const contentInput = document.getElementById('postContent');
                if (lang === 'ko') {
                    authorInput.placeholder = authorInput.getAttribute('data-ko');
                    contentInput.placeholder = contentInput.getAttribute('data-ko');
                } else {
                    authorInput.placeholder = authorInput.getAttribute('data-en');
                    contentInput.placeholder = contentInput.getAttribute('data-en');
                }
            }, 400);
        };
    </script>
    <style>
        @keyframes formFadeIn {
            0% {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(5px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }
    </style>
</body>

</html>
